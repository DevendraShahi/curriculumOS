name: Course Seed CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-and-test-seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate seed payload
        run: npm run db:seed:course:validate

      - name: Run payload integration test
        run: npm run test:integration:course-seed-payload

      - name: Dry promote (requires env)
        if: ${{ secrets.MONGODB_URI != '' && secrets.MONGODB_DB_NAME != '' }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          APP_DEFAULT_TENANT_ID: public
        run: npm run db:seed:course:promote:dry
